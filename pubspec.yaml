name: amar_proshno
description: A simple Flutter Quiz Application - Amar Proshno (BDApps Subscription enabled)

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  get: 4.6.6

  # Local storage (replaces Firebase Auth persistence)
  shared_preferences: ^2.2.3

  # HTTP client for BDApps subscription REST API
  http: ^1.2.0

  # Connectivity status for offline handling
  connectivity_plus: ^6.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true